name: CD QA - Notification Service

on:
  push:
    branches: [ develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/cybersapienseci/notification-service

jobs:
  deploy-qa:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:qa-${{ github.sha }},${{ env.IMAGE_NAME }}:qa-latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS_Noti }}

      - name: Deploy to Azure Container Apps (QA)
        run: |
          az containerapp up \
            --name notification-service \
            --resource-group rg-alphaeci \
            --image ${{ env.IMAGE_NAME }}:qa-${{ github.sha }} \
            --registry-server ghcr.io \
            --registry-username ${{ github.actor }} \
            --registry-password ${{ secrets.GITHUB_TOKEN }} \
            --ingress external \
            --target-port 8080

          az containerapp update \
            --name notification-service \
            --resource-group rg-alphaeci \
            --min-replicas 0 \
            --max-replicas 1 \
            --set-env-vars \
              "SPRING_DATA_MONGODB_URI=${{ secrets.MONGODB_URI_NOTIFICATION }}" \
              "SPRING_RABBITMQ_HOST=${{ secrets.RABBITMQ_HOST }}" \
              "SPRING_RABBITMQ_PORT=5671" \
              "SPRING_RABBITMQ_USERNAME=${{ secrets.RABBITMQ_USERNAME }}" \
              "SPRING_RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}" \
              "SPRING_RABBITMQ_VIRTUAL_HOST=${{ secrets.RABBITMQ_VIRTUAL_HOST }}" \
              "SPRING_RABBITMQ_SSL_ENABLED=true" \
              "SPRING_MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" \
              "SPRING_MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}"
